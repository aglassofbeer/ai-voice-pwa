<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>音声AIアシスタントa</title>
</head>
<body>
  <h1>🎙️ AIボイスアシスタント</h1>

  <button id="recordBtn">🔴 録音開始</button>
  <button id="stopBtn" disabled>⏹️ 停止・送信</button>

  <p id="status">ステータス: 待機中</p>
  <audio id="audioPlayer" controls></audio>

  <script>
    let mediaRecorder;
    let audioChunks = [];

    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusText = document.getElementById("status");
    const audioPlayer = document.getElementById("audioPlayer");

    recordBtn.onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        statusText.textContent = "送信中...";

        const formData = new FormData();
        formData.append("audio", audioBlob, "voice.webm");

        const response = await fetch("https://ai-voice-server-31vd.onrender.com/voice", {
          method: "POST",
          body: formData
        });

        const audioBuffer = await response.arrayBuffer();
        const blob = new Blob([audioBuffer], { type: "audio/mpeg" });
        const url = URL.createObjectURL(blob);

        audioPlayer.src = url;
        statusText.textContent = "再生準備完了 🎧";
      };

      mediaRecorder.start();
      statusText.textContent = "録音中...";
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
      mediaRecorder.stop();
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      statusText.textContent = "録音停止";
    };
  </script>
</body>
</html>
