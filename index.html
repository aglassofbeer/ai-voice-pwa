
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff" />
  <title>AI 音声アシスタント</title>
</head>
<body>
  <h1>🎙 AI 音声アシスタント</h1>
  <textarea id="inputText" rows="3" cols="40" placeholder="話しかけてください..."></textarea><br>
  <button id="sendBtn">送信</button>
  <audio id="player" controls style="margin-top:20px; display:none;"></audio>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const input = document.getElementById("inputText");
    const audio = document.getElementById("player");

    sendBtn.onclick = async () => {
      const message = input.value;
      const response = await fetch("https://ai-voice-server-31vd.onrender.com/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      if (!response.ok) {
        alert("エラーが発生しました");
        return;
      }

      const blob = await response.blob();
      audio.src = URL.createObjectURL(blob);
      audio.style.display = "block";
      audio.play();
    };
  </script>
</body>
</html>
