
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIボイスアシスタント</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    button { margin: 10px; padding: 10px 20px; }
    .recording-indicator {
      width: 15px; height: 15px; border-radius: 50%; background-color: red;
      display: inline-block; margin-left: 10px; animation: blink 1s infinite; vertical-align: middle;
    }
    @keyframes blink {
      0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; }
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🎤 音声エコーテスト</h1>

  <div>
    <button id="recordBtn">🔴 録音開始</button>
    <button id="stopBtn" disabled>⏹ 停止・送信</button>
    <span id="indicator" class="recording-indicator hidden"></span>
  </div>

  <p id="status">再生準備完了 🎧</p>
  <audio id="audio" controls></audio>

  <script>
    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const status = document.getElementById("status");
    const indicator = document.getElementById("indicator");
    const audio = document.getElementById("audio");

    let mediaRecorder;
    let audioChunks = [];

    recordBtn.onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        audioChunks.push(e.data);
      };

      mediaRecorder.start();
      recordBtn.disabled = true;
      stopBtn.disabled = false;
      indicator.classList.remove("hidden");
      status.textContent = "録音中...";
    };

    stopBtn.onclick = async () => {
      mediaRecorder.stop();
      stopBtn.disabled = true;
      recordBtn.disabled = false;
      indicator.classList.add("hidden");
      status.textContent = "送信中...";

      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", blob, "voice.webm");

        const response = await fetch("https://ai-voice-server-xxxxx.onrender.com/echo-audio", {
          method: "POST",
          body: formData
        });

        const audioBlob = await response.blob();
        const url = URL.createObjectURL(audioBlob);
        audio.src = url;
        status.textContent = "再生準備完了 🎧";
      };
    };
  </script>
</body>
</html>
